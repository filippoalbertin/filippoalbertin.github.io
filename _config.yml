# Configurazione Jekyll per tema Hacker
title: Filippo Albertin Git Blog
description: Opinioni e Connessioni
url: "https://filippoalbertin.github.io" # URL del tuo sito GitHub Pages

# Tema
theme: jekyll-theme-hacker
# Alternativa per GitHub Pages:
# remote_theme: pages-themes/hacker@v0.2.0

# Informazioni autore
author:
  name: Filippo Albertin
  email: albertin@tuta.io

# Social links (opzionali)
github_username: filippoalbertin
twitter_username: creativephil75

# Configurazioni build
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/

# Plugin supportati da GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Esclusioni
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# Configurazione kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# Configurazione dei post
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Il Tuo Nome"

# SEO e metadata
lang: it
timezone: Europe/Rome

# GitHub Pages specifico
github: [metadata]
